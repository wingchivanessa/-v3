<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>速率實驗室：動態標尺版</title>
    <style>
        :root { --bus: #007bff; --minibus: #ffc107; --taxi: #dc3545; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: #f0f4f8; padding: 20px; }
        .container { max-width: 950px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        
        /* 輸入面板 */
        .panel { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .card { flex: 1; min-width: 280px; padding: 15px; border-radius: 10px; border: 1px solid #ddd; background: #fafafa; }
        .card h3 { margin-top: 0; color: #333; border-left: 5px solid; padding-left: 10px; }
        .input-group { margin: 10px 0; display: flex; align-items: center; gap: 5px; }
        input { width: 70px; padding: 5px; border: 1px solid #ccc; border-radius: 4px; }
        select { padding: 5px; border-radius: 4px; }

        /* 按鈕 */
        .controls { display: flex; gap: 10px; margin-bottom: 30px; }
        button { flex: 1; padding: 12px; font-weight: bold; cursor: pointer; border: none; border-radius: 8px; font-size: 16px; }
        .btn-run { background: #28a745; color: white; }
        .btn-reset { background: #6c757d; color: white; }

        /* 賽道與動態尺規 */
        .race-track { background: #333; border-radius: 10px; padding: 20px 40px 80px 40px; position: relative; overflow: hidden; }
        .lane { height: 60px; border-bottom: 1px dashed #555; position: relative; }
        .vehicle { position: absolute; left: 0; bottom: 5px; font-size: 40px; transition: left 2s ease-out; z-index: 2; }
        
        /* 雙單位尺規 */
        .ruler-container { position: absolute; bottom: 0; left: 40px; right: 40px; height: 60px; }
        .ruler-line { width: 100%; height: 2px; background: white; position: absolute; top: 0; }
        .mark { position: absolute; width: 1px; height: 10px; background: white; top: 0; }
        .mark-label { position: absolute; top: 15px; transform: translateX(-50%); color: #fff; font-size: 11px; text-align: center; width: 60px; }
        .km-label { top: 35px; color: #00d4ff; font-weight: bold; }

        details { margin-top: 20px; background: #eee; border-radius: 8px; }
        summary { padding: 15px; cursor: pointer; font-weight: bold; }
        .calc-box { padding: 15px; background: white; border-top: 1px solid #ddd; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #eee; padding: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center;">📏 交通工具速率與路程實驗室</h2>
    
    <div class="panel">
        <div class="card" style="border-color: var(--bus);">
            <h3 style="border-color: var(--bus);">🚌 巴士</h3>
            <div class="input-group">距離: <input type="number" id="d1"> <select id="du1"><option value="m">米(m)</option><option value="km">公里(km)</option></select></div>
            <div class="input-group">時間: <input type="number" id="t1"> <select id="tu1"><option value="s">秒(s)</option><option value="h">小時(hr)</option></select></div>
        </div>
        <div class="card" style="border-color: var(--minibus);">
            <h3 style="border-color: var(--minibus);">🚐 小巴</h3>
            <div class="input-group">距離: <input type="number" id="d2"> <select id="du2"><option value="m">米(m)</option><option value="km">公里(km)</option></select></div>
            <div class="input-group">時間: <input type="number" id="t2"> <select id="tu2"><option value="s">秒(s)</option><option value="h">小時(hr)</option></select></div>
        </div>
        <div class="card" style="border-color: var(--taxi);">
            <h3 style="border-color: var(--taxi);">🚕 的士</h3>
            <div class="input-group">距離: <input type="number" id="d3"> <select id="du3"><option value="m">米(m)</option><option value="km">公里(km)</option></select></div>
            <div class="input-group">時間: <input type="number" id="t3"> <select id="tu3"><option value="s">秒(s)</option><option value="h">小時(hr)</option></select></div>
        </div>
    </div>

    <div class="controls">
        <button class="btn-run" onclick="startSimulation()">🏁 更新尺規並起跑</button>
        <button class="btn-reset" onclick="resetAll()">🔄 重置</button>
    </div>

    <div class="race-track">
        <div class="lane"><span id="v1" class="vehicle">🚌</span></div>
        <div class="lane"><span id="v2" class="vehicle">🚐</span></div>
        <div class="lane"><span id="v3" class="vehicle">🚕</span></div>
        <div class="ruler-container" id="ruler">
            <div class="ruler-line"></div>
            </div>
    </div>

    <details>
        <summary>📊 計算方法與單位換算結果</summary>
        <div class="calc-box">
            <table id="resTable">
                <thead>
                    <tr><th>工具</th><th>換算距離 (m)</th><th>換算時間 (s)</th><th>速率 (m/s)</th></tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </details>
</div>

<script>
function startSimulation() {
    let vehicles = [];
    let maxDistance_m = 0;

    // 1. 讀取並換算數據
    for(let i=1; i<=3; i++) {
        let d = parseFloat(document.getElementById('d'+i).value) || 0;
        let t = parseFloat(document.getElementById('t'+i).value) || 1;
        let du = document.getElementById('du'+i).value;
        let tu = document.getElementById('tu'+i).value;

        let dm = du === 'km' ? d * 1000 : d;
        let ts = tu === 'h' ? t * 3600 : t;
        let speed = dm / ts;

        vehicles.push({ id: 'v'+i, dm: dm, ts: ts, speed: speed });
        if (dm > maxDistance_m) maxDistance_m = dm;
    }
